spring.application.name=aramoveis

# URL de conex„o com o banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/aramoveis

spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:491273}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.pool-name=HikariPoolAramoveis

spring.datasource.hikari.maximum-pool-size=10

spring.datasource.hikari.connection-timeout=30000

spring.datasource.hikari.max-lifetime=1800000

spring.datasource.hikari.idle-timeout=600000

spring.jackson.time-zone=America/Sao_Paulo

spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# Porta padr„o do servidor
server.port=8080
