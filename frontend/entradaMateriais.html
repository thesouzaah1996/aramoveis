<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Entrada de Materiais | Aramóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/entradaMateriais.css" rel="stylesheet"> <link href="css/entrada-materiais.css" rel="stylesheet"> </head>
<body>

    <div class="container-fluid">
        <nav aria-label="breadcrumb" class="container d-flex justify-content-end mt-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="adminPage.html">Home</a></li>
                <li class="breadcrumb-item"><a href="gestaoAlmoxarifado.html">Almoxarifado</a></li>
                <li class="breadcrumb-item"><a href="entradaMateriais.html">Entrada de Materiais</a></li>
            </ol>
        </nav>
    </div>

    <main class="container py-5">
        <h2 class="text-primary fw-bold mb-4 text-center">Entrada de Materiais</h2>
        <p class="lead text-muted mb-5 text-center">Preencha os detalhes para registrar a entrada de novos materiais no estoque.</p>

        <form id="entradaMaterialForm" class="material-form">
            <div class="row mb-4">
                <div class="col-md-6 mx-auto">
                    <label for="setorSelect" class="form-label fw-semibold">Selecione o Setor:</label>
                    <select class="form-select" id="setorSelect" required>
                        <option value="">-- Selecione --</option>
                        <option value="Administrativo">Administrativo</option>
                        <option value="Almoxarifado">Almoxarifado</option>
                        <option value="Assistência">Assistência</option>
                        <option value="Carregamento">Carregamento</option>
                        <option value="Corte">Corte</option>
                        <option value="Embalagem">Embalagem</option>
                        <option value="Manutenção">Manutenção</option>
                        <option value="PCP">PCP</option>
                        <option value="Pintura">Pintura</option>
                        <option value="Portaria">Portaria</option>
                        <option value="Usinagem">Usinagem</option>
                    </select>
                </div>
            </div>

            <div id="commonFields" class="card p-4 mb-4" style="display: none;">
                <h5 class="card-title text-primary mb-3">Informações Gerais</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="responsavel" class="form-label">ID Produto:</label>
                        <input type="text" class="form-control" id="idProduto" placeholder="Ex: X123RT3F" required>
                    </div>
                    <div class="col-md-6">
                        <label for="dataEntrada" class="form-label">Data de Entrada:</label>
                        <input type="date" class="form-control" id="dataEntrada" required>
                    </div>
                    <div class="col-md-6">
                        <label for="notaFiscal" class="form-label">Número da Nota Fiscal:</label>
                        <input type="text" class="form-control" id="notaFiscal" placeholder="Ex: 001.234.567" required>
                    </div>
                    <div class="col-md-6">
                        <label for="fornecedor" class="form-label">Fornecedor:</label>
                        <input type="text" class="form-control" id="fornecedor" placeholder="Nome do Fornecedor" required>
                    </div>
                     <div class="col-md-6">
                        <label for="responsavel" class="form-label">Responsável pelo Recebimento:</label>
                        <input type="text" class="form-control" id="responsavel" placeholder="Seu Nome" required>
                    </div>
                </div>
            </div>

            <div id="setorSpecificFields">
                </div>

            <div class="d-grid gap-2 col-md-4 mx-auto mt-5">
                <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-cloud-arrow-up me-2"></i> Registrar Entrada</button>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/entradaMateriais.js"></script> </body>
</html>
