<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Criar Usuário | Aramóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/global.css" rel="stylesheet"> 
    <link href="css/criarUsuario.css" rel="stylesheet"> 
</head>
<body>
    <main class="container py-5">
        <img src="img/pequena.webp" alt="">

        <form id="createUserForm" class="user-form">
            <div class="row g-3">
                <div class="col-12">
                    <label for="userName" class="form-label">Nome Completo:</label>
                    <input type="text" class="form-control" id="userName" placeholder="Nome do Usuário" required>
                </div>
                <div class="col-12">
                    <label for="userEmail" class="form-label">Email:</label>
                    <input type="email" class="form-control" id="userEmail" placeholder="email@exemplo.com" required>
                </div>
                <div class="col-md-6">
                    <label for="userPassword" class="form-label">Senha:</label>
                    <input type="password" class="form-control" id="userPassword" placeholder="********" required>
                </div>
                <div class="col-md-6">
                    <label for="confirmPassword" class="form-label">Confirmar Senha:</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="********" required>
                </div>
                <div class="col-12">
                    <label for="userSector" class="form-label">Setor de Trabalho:</label>
                    <select class="form-select" id="userSector" required>
                        <option value="">-- Selecione o Setor --</option>
                        <option value="Almoxarifado">Almoxarifado</option>
                        <option value="Administrativo">Administrativo</option>
                        <option value="Compras">Compras</option>
                        <option value="Portaria">Portaria</option>
                        <option value="PCP">PCP</option>
                        <option value="Assistência">Assistência</option>
                    </select>
                </div>
                <div class="col-12">
                    <label for="userRole" class="form-label">Nível de Acesso (Perfil):</label>
                    <select class="form-select" id="userRole" required>
                        <option value="">-- Selecione o Perfil --</option>
                        <option value="Administrador">Administrador</option>
                        <option value="Comum">Usuário</option>
                        <option value="Leitura">Somente Leitura</option>
                    </select>
                </div>
            </div>

            <div class="d-grid gap-2 col-md-6 mx-auto mt-5">
                <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-person-plus me-2"></i> Criar Usuário</button>
            </div>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
