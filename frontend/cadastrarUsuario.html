<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Usuário - Aramóveis</title>
  <link rel="stylesheet" href="css/cadastrarUsuario.css" />
</head>
<body>
  <div class="form-container">
    <div class="form-card">
      <h2>Cadastrar Novo Usuário</h2>
      <form class="user-form">
        <div class="input-group">
          <label for="nome">Nome Completo</label>
          <input type="text" id="nome" name="nome" placeholder="Nome do Usuário" required />
        </div>

        <div class="input-group">
          <label for="email">Usuário</label>
          <input type="usuario" id="usuario" name="usuario" placeholder="meuUsuario123" required />
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="********" required />
        </div>

        <div class="input-group">
          <label for="confirmar-senha">Confirmar Senha</label>
          <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="********" required />
        </div>

        <div class="input-group">
          <label for="setor">Setor de Trabalho</label>
          <select id="setor" name="setor" required>
            <option value="">-- Selecione o Setor --</option>
            <option value="almoxarifado">Almoxarifado</option>
            <option value="administrativo">Administrativo</option>
            <option value="compras">Compras</option>
            <option value="portaria">Portaria</option>
            <option value="pcp">PCP</option>
            <option value="assistencia">Assistência</option>
            <option value="rh">Recursos Humanos</option>
            <option value="carregamento">Carregamento</option>
            <option value="financeiro">Financeiro</option>
          </select>
        </div>

        <div class="input-group">
          <label for="perfil">Nível de Acesso (Perfil)</label>
          <select id="perfil" name="perfil" required>
            <option value="">-- Selecione o Perfil --</option>
            <option value="administrador">Encarregado</option>
            <option value="usuario">Conferente</option>
            <option value="rh">Auxiliar</option>
          </select>
        </div>

        <button type="submit" class="btn-primary">Criar Usuário</button>
      </form>
    </div>
  </div>
</body>
</html>
